<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="skin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f5d96b"/>
      <stop offset="100%" stop-color="#c89a2c"/>
    </linearGradient>
    <linearGradient id="ear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c89a2c"/>
      <stop offset="100%" stop-color="#9a7518"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080d2a"/>

  <!-- Ear (behind head, peeking right) -->
  <ellipse cx="24" cy="10" rx="6" ry="7" fill="url(#ear)"/>

  <!-- Elephant head facing right: forehead, face, jaw, thick trunk flowing down -->
  <path d="
    M 10 6
    C 14 3, 22 3, 25 7
    C 27 10, 26 14, 24 17
    C 22 19, 21 20, 20 21
    C 19 23, 18.5 25, 18 27
    C 17.5 29, 17 30, 15.5 30
    C 14 30, 14 29, 14.5 27
    C 15 25, 14 23, 12 21
    C 10 19, 8 16, 7 13
    C 6 10, 7 7, 10 6
    Z
  " fill="url(#skin)"/>

  <!-- Forehead stripes (subtle, following head curve) -->
  <path d="M9 9 Q16 7 23 9" fill="none" stroke="#a07818" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <path d="M8 12.5 Q15 10.5 24 13" fill="none" stroke="#a07818" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Trunk wrinkles -->
  <path d="M13.5 24 Q16 23 18 24.5" fill="none" stroke="#a07818" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>
  <path d="M14 27 Q15.5 26 17.5 27.5" fill="none" stroke="#a07818" stroke-width="0.7" stroke-linecap="round" opacity="0.4"/>

  <!-- Tusk (white, small, curving from jaw) -->
  <path d="M20 19 Q18.5 21 19 23" fill="none" stroke="#e8e4f0" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="21" cy="10" r="1.3" fill="#080d2a"/>
  <circle cx="21.4" cy="9.6" r="0.45" fill="#fff"/>

  <!-- Tiny circus tent hat on top of head -->
  <polygon points="15,4 13.5,7 16.5,7" fill="#e8456b"/>
  <line x1="15" y1="4" x2="15" y2="7" stroke="#fff" stroke-width="0.4" opacity="0.3"/>
  <circle cx="15" cy="3.5" r="0.55" fill="#40e0d0"/>
</svg>
